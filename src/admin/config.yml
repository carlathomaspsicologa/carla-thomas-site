backend:
  name: github
  repo: carlathomaspsicologa/carla-thomas-site
  branch: main

locale: "pt"

media_folder: "src/assets/img/blog"
public_folder: "/assets/img/blog"

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Artigo"
    folder: "src/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Resumo (aparece no card)", name: "resumo", widget: "text" }
      - { label: "Categoria", name: "categoria", widget: "select", options: ["Ansiedade", "Autoestima", "Sobrecarga emocional", "Transições de vida", "Psicoterapia", "Reflexões"], default: "Reflexões" }
      - { label: "Tempo de leitura", name: "tempoLeitura", widget: "string", default: "3 min", hint: "Ex: 3 min" }
      - { label: "Conteúdo", name: "body", widget: "markdown" }